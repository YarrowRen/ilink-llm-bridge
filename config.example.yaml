# iLink 连接配置（由 login.py 写入 credentials.json，此处留空即可）
ilink:
  base_url: ""        # login.py 自动写入
  cdn_base_url: "https://novac2c.cdn.weixin.qq.com/c2c"

# LLM 提供商配置 — 修改 name 切换提供商
provider:
  name: openai        # openai | claude | gemini | dify | qwen | grok | seed
  api_key: "sk-..."
  model: "gpt-4o"
  max_tokens: 2048   
  base_url: ""     

# Bot 行为
bot:
  system_prompt: "You are a helpful assistant."
  max_history_length: 20   # 每用户保留的最大消息条数
  chunk_size: 1000          # 超过此字数自动分段发送
  allow_from: []            # ilink_user_id 白名单，空列表 = 允许所有人

# 存储路径（相对于项目根目录）
storage:
  history_dir: "./data/history"
  media_dir: "./data/media"

log:
  level: info   # debug | info | warn | error

